<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astra-Lab | Global Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; }
        .neon-border { border: 1px solid #00ff41; box-shadow: 0 0 15px rgba(0, 255, 65, 0.3); }
        .terminal-glow { text-shadow: 0 0 8px #00ff41; }
        .rank-card { background: rgba(0, 255, 65, 0.05); border-left: 3px solid #00ff41; }
    </style>
</head>
<body class="p-6">

    <header class="max-w-xl mx-auto mb-10">
        <h1 class="text-3xl font-black terminal-glow tracking-tighter">ASTRA-LAB_MAINFRAME</h1>
        <p id="citizen-tag" class="text-xs opacity-60">CITIZEN: SYNCING...</p>
    </header>

    <main class="max-w-xl mx-auto space-y-8">
        
        <section id="mission-box" class="neon-border p-6 rounded-lg bg-black">
            <div id="quiz-ui">
                <h2 class="text-sm font-bold mb-4 uppercase tracking-widest">[ MISSION_01: LOGIC_SPRINT ]</h2>
                <button onclick="startQuiz()" class="w-full py-4 border border-green-500 hover:bg-green-500 hover:text-black font-bold transition">
                    INITIALIZE NEURAL LINK
                </button>
            </div>
            
            <div id="quiz-active" class="hidden">
                <p id="q-text" class="text-xl mb-6">LOADING DATA...</p>
                <div id="options" class="grid gap-3"></div>
            </div>
        </section>

        <section class="neon-border p-6 rounded-lg bg-black">
            <h2 class="text-xs font-bold mb-4 uppercase tracking-[0.3em] text-white">Global Ranking_</h2>
            <div id="leaderboard-list" class="space-y-3">
                <p class="text-xs animate-pulse">Accessing cloud registry...</p>
            </div>
        </section>
<section class="neon-border p-4 rounded-lg bg-black mt-8">
    <h2 class="text-xs font-bold mb-4 uppercase tracking-[0.3em] text-white">
        <span class="animate-pulse">●</span> Global_Registry_Top_5
    </h2>
    <div id="leaderboard-list" class="space-y-2">
        <p class="text-[10px] opacity-50 text-green-500">Accessing Astra-Net...</p>
    </div>
</section>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDocs, collection, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCjq3ixY5lfZAQInf1ffYK...", 
            authDomain: "quizzbench-or-astralab.firebaseapp.com",
            projectId: "quizzbench-or-astralab",
            storageBucket: "quizzbench-or-astralab.appspot.com",
            messagingSenderId: "99339667817",
            appId: "1:99339667817:web:7789fa35e6..."
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const userEmail = localStorage.getItem('citizenEmail') || "Unknown_Subject";

        document.getElementById('citizen-tag').innerText = `CITIZEN: ${userEmail.toUpperCase()}`;

        // 1. FETCH TOP 5 FROM FIREBASE
        async function loadLeaderboard() {
            const lbContainer = document.getElementById('leaderboard-list');
            try {
                const q = query(collection(db, "leaderboard"), orderBy("xp", "desc"), limit(5));
                const querySnapshot = await getDocs(q);
                lbContainer.innerHTML = "";
                
                let rank = 1;
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const item = document.createElement('div');
                    item.className = "rank-card p-3 flex justify-between items-center text-sm";
                    item.innerHTML = `
                        <span><span class="opacity-50">#${rank}</span> ${data.email.split('@')[0]}</span>
                        <span class="font-bold text-white">${data.xp} XP</span>
                    `;
                    lbContainer.appendChild(item);
                    rank++;
                });
            } catch (e) {
                lbContainer.innerText = "Error accessing registry.";
            }
        }

        // 2. SAVE SCORE AND REFRESH
        window.saveScore = async (score) => {
            await setDoc(doc(db, "leaderboard", userEmail), {
                email: userEmail,
                xp: score,
                timestamp: new Date()
            });
            loadLeaderboard(); // Update board immediately
        };

        // Initialize Board
        loadLeaderboard();

        // --- Add your existing Quiz Logic here (questions, startQuiz, etc.) ---
    </script>
</body>
</html>
