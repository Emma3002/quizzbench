<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astra-Lab | Global Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; overflow-x: hidden; }
        .neon-border { border: 1px solid #00ff41; box-shadow: 0 0 10px rgba(0, 255, 65, 0.2); }
        .terminal-text { text-shadow: 0 0 5px #00ff41; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="status-bar" class="text-[10px] mb-4 opacity-50 flex justify-between uppercase">
        <span>System: Astra-Lab v1.1</span>
        <span id="db-status">Initializing Brain...</span>
    </div>

    <main id="app-container" class="max-w-2xl mx-auto">
        <header class="mb-8 border-b border-green-900 pb-4">
            <h1 class="text-2xl font-black tracking-widest terminal-text">MAIN_FRAME</h1>
            <p class="text-xs opacity-70" id="citizen-tag">IDENTIFYING CITIZEN...</p>
        </header>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="neon-border p-4 rounded-lg bg-black/50">
                <p class="text-[10px] uppercase opacity-60">Global Rank</p>
                <p class="text-xl font-bold text-yellow-500">#---</p>
            </div>
            <div class="neon-border p-4 rounded-lg bg-black/50">
                <p class="text-[10px] uppercase opacity-60">Genesis XP</p>
                <p id="xp-display" class="text-xl font-bold text-white">0</p>
            </div>
        </div>

        <section class="neon-border p-6 rounded-xl bg-green-900/10">
            <h2 class="text-sm font-bold mb-4 uppercase tracking-widest text-white">Active Missions</h2>
            <div id="mission-gate">
                <button onclick="runTestMission()" class="w-full border border-green-500 py-6 rounded-lg font-black hover:bg-green-500 hover:text-black transition-all uppercase tracking-tighter">
                    [ Sync Neural Link ]
                </button>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyCjq3ixY5lfZAQInf1ffYK...", 
            authDomain: "quizzbench-or-astralab.firebaseapp.com",
            projectId: "quizzbench-or-astralab",
            storageBucket: "quizzbench-or-astralab.appspot.com",
            messagingSenderId: "99339667817",
            appId: "1:99339667817:web:7789fa35e6..."
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // UI Updates
        document.getElementById('db-status').innerText = "Brain: ONLINE";
        const userEmail = localStorage.getItem('citizenEmail') || "Unknown_Subject";
        document.getElementById('citizen-tag').innerText = `CITIZEN: ${userEmail.toUpperCase()}`;

        // TEST MISSION: Saves data to Firestore
        window.runTestMission = async () => {
            const testXP = Math.floor(Math.random() * 500) + 100;
            try {
                await setDoc(doc(db, "leaderboard", userEmail), {
                    email: userEmail,
                    xp: testXP,
                    lastActive: new Date()
                });
                alert(`NEURAL SYNC COMPLETE! XP Recorded: ${testXP}`);
                location.reload(); 
            } catch (e) {
                alert("SYNC ERROR: Check Firebase Rules");
                console.error(e);
            }
        };

        // LOAD DATA
        async function loadData() {
            const docSnap = await getDoc(doc(db, "leaderboard", userEmail));
            if (docSnap.exists()) {
                document.getElementById('xp-display').innerText = docSnap.data().xp;
            }
        }
        loadData();
    </script>
</body>
</html>
