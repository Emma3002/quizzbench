<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astra-Lab | Brain Race Sprint</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; overflow: hidden; }
        .neon-border { border: 1px solid #00ff41; box-shadow: 0 0 10px rgba(0, 255, 65, 0.2); }
        .progress-bar { height: 4px; background: #00ff41; transition: width 0.1s linear; }
    </style>
</head>
<body class="p-4 md:p-10 flex items-center justify-center min-h-screen">

    <main id="terminal" class="w-full max-w-xl neon-border p-6 rounded-xl bg-black/90">
        <div id="setup-screen">
            <h1 class="text-xl mb-4 tracking-tighter uppercase font-black">[ MISSION_01: LOGIC_SPRINT ]</h1>
            <p class="text-xs mb-8 opacity-70">10 QUESTIONS. SPEED ADDS MULTIPLIERS. SYNCING TO CLOUD...</p>
            <button onclick="startQuiz()" class="w-full border border-green-500 py-6 rounded hover:bg-green-500 hover:text-black transition uppercase font-bold">
                Initialize Neural Link
            </button>
        </div>

        <div id="quiz-screen" class="hidden">
            <div class="flex justify-between text-[10px] mb-2 uppercase opacity-50">
                <span id="q-count">Question: 0/10</span>
                <span id="timer-text">Neural Window: 10.0s</span>
            </div>
            <div class="w-full bg-green-900/30 mb-6"><div id="progress" class="progress-bar" style="width: 100%"></div></div>
            
            <h2 id="question-text" class="text-lg md:text-xl mb-8 min-h-[60px]">DATA_PENDING...</h2>
            
            <div id="options-grid" class="grid grid-cols-1 gap-3">
                </div>
        </div>

        <div id="result-screen" class="hidden text-center">
            <h1 class="text-3xl font-black mb-2 text-yellow-500">MISSION COMPLETE</h1>
            <p id="final-xp" class="text-sm mb-6">RECOVERY XP: 0</p>
            <button onclick="location.reload()" class="border border-green-500 px-8 py-3 text-xs uppercase hover:bg-green-500 hover:text-black">Return to Hub</button>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCjq3ixY5lfZAQInf1ffYK...", 
            authDomain: "quizzbench-or-astralab.firebaseapp.com",
            projectId: "quizzbench-or-astralab",
            storageBucket: "quizzbench-or-astralab.appspot.com",
            messagingSenderId: "99339667817",
            appId: "1:99339667817:web:7789fa35e6..."
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const questions = [
            { q: "If A = 5 and B = 10, what is A + B * 2?", a: ["25", "30", "20", "15"], correct: 0 },
            { q: "Which planet is known as the Red Planet?", a: ["Venus", "Mars", "Jupiter", "Saturn"], correct: 1 },
            { q: "What is the square root of 144?", a: ["10", "11", "12", "14"], correct: 2 },
            { q: "What is 15% of 200?", a: ["20", "30", "40", "15"], correct: 1 },
            { q: "Which element has the symbol 'O'?", a: ["Gold", "Osmium", "Oxygen", "Iron"], correct: 2 }
        ];

        let currentQ = 0;
        let totalXP = 0;
        let timeLeft = 100;
        let timer;

        window.startQuiz = () => {
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            loadQuestion();
        }

        function loadQuestion() {
            if (currentQ >= questions.length) return endMission();
            
            const q = questions[currentQ];
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('q-count').innerText = `Question: ${currentQ + 1}/${questions.length}`;
            
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            q.a.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "text-left p-4 border border-green-900 bg-green-900/10 hover:bg-green-500 hover:text-black transition uppercase text-xs";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(idx);
                grid.appendChild(btn);
            });

            startTimer();
        }

        function startTimer() {
            clearInterval(timer);
            timeLeft = 100;
            timer = setInterval(() => {
                timeLeft -= 1;
                document.getElementById('progress').style.width = timeLeft + "%";
                document.getElementById('timer-text').innerText = `Neural Window: ${(timeLeft/10).toFixed(1)}s`;
                if (timeLeft <= 0) checkAnswer(-1);
            }, 100);
        }

        function checkAnswer(idx) {
            clearInterval(timer);
            if (idx === questions[currentQ].correct) {
                totalXP += (timeLeft * 10);
            }
            currentQ++;
            loadQuestion();
        }

        async function endMission() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-xp').innerText = `RECOVERY XP: ${totalXP}`;
            
            const userEmail = localStorage.getItem('citizenEmail') || "Unknown_Subject";
            try {
                await setDoc(doc(db, "leaderboard", userEmail), {
                    email: userEmail,
                    xp: totalXP,
                    timestamp: new Date()
                });
            } catch (e) { console.error("Cloud Sync Failed", e); }
        }
    </script>
</body>
</html>
