<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astra-Lab | Main Frame</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; }
        .neon-border { border: 1px solid #00ff41; box-shadow: 0 0 15px rgba(0, 255, 65, 0.3); }
        .glitch { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-6">

    <div id="login-screen" class="max-w-md mx-auto mt-20 text-center">
        <h1 class="text-2xl mb-6 glitch">SYSTEM_LOCK: ENTER_EMAIL</h1>
        <input type="email" id="citizen-email" placeholder="ID-EMAIL" 
               class="bg-black border border-green-500 p-4 w-full mb-4 text-center outline-none">
        <button onclick="enterLab()" class="w-full bg-green-900 border border-green-500 py-4 hover:bg-green-500 hover:text-black transition uppercase font-bold">
            Access Terminal
        </button>
    </div>

    <div id="main-terminal" class="max-w-md mx-auto hidden">
        <header class="flex justify-between items-center mb-10 border-b border-green-900 pb-4">
            <div>
                <h1 class="text-xl font-bold">ASTRA-LAB v1.0</h1>
                <p class="text-[10px] opacity-70" id="user-display">CITIZEN: PENDING...</p>
            </div>
            <button onclick="logout()" class="text-[10px] border border-red-900 text-red-500 px-2 py-1">LOGOUT</button>
        </header>

        <div class="neon-border p-6 rounded-lg bg-black/80 mb-6">
            <h2 class="text-white uppercase mb-4 text-sm font-bold">Sector 01: Global Brain Race</h2>
            <div class="space-y-4">
                <div class="flex justify-between border-b border-green-900 pb-2">
                    <span class="text-xs">CURRENT RANK:</span>
                    <span class="text-yellow-500 font-bold">#---</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-xs">GENESIS XP:</span>
                    <span class="text-white">0</span>
                </div>
            </div>
        </div>

        <button onclick="startMission()" class="w-full neon-border py-6 rounded text-center hover:bg-green-500 hover:text-black transition uppercase font-black tracking-widest">
            [ START SPRINT_01 ]
        </button>
    </div>

    <script>
        // Simple Logic to switch screens
        function enterLab() {
            const email = document.getElementById('citizen-email').value;
            if(email.includes('@')) {
                localStorage.setItem('citizenEmail', email);
                showApp(email);
            } else {
                alert("INVALID ID");
            }
        }

        function showApp(email) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-terminal').classList.remove('hidden');
            document.getElementById('user-display').innerText = `CITIZEN: ${email.toUpperCase()}`;
        }

        function logout() {
            localStorage.removeItem('citizenEmail');
            location.reload();
        }

        // Auto-login if they already entered email
        const savedEmail = localStorage.getItem('citizenEmail');
        if(savedEmail) {
            showApp(savedEmail);
        }

        function startMission() {
            alert("Sprinting to the Brain Race logic... Stand by.");
        }
    </script>
</body>
</html>
